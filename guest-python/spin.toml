spin_manifest_version = 2

[application]
name = "cron-sampl-py"
authors = ["The Spin authors"]
version = "0.1.0"

[[trigger.cron]]
component = "every2seconds"
cron_expression = "1/2 * * * * *"

[component.every2seconds]
source = "app.wasm"
[component.every2seconds.build]
command = "componentize-py -d ../cron.wit -w spin:cron/spin-cron@3.0.0 componentize app -o app.wasm"
[component.every2seconds.variables]
something = "2s"
