spin_manifest_version = 2

[application]
name = "async-command"
version = "0.1.0"
authors = ["Spin Framework Contributors"]
description = "A command trigger example that makes an async outbound request"

[[trigger.command]]
component = "job"

[component.job]
source = "target/wasm32-wasip2/release/job.wasm"
allowed_outbound_hosts = ["https://myip.fermyon.app/"]
build = ["cargo build --target wasm32-wasip2 --release"]
